<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

/* GLASS */
.glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
}

/* STATS */
.stats {
    display: flex;
    gap: 15px;
}

.stat-box {
    flex: 1;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    transition: 0.3s;
}

.stat-box:hover {
    transform: scale(1.05);
}

.blue { background: #2193b0; }
.green { background: #56ab2f; }
.orange { background: #f7971e; }

/* BUTTON */
.btn-back {
    background: #ff416c;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
}

</style>

</head>

<body>

<div class="container mt-4">

<h2 class="text-center mb-4">👑 Admin Dashboard</h2>

<!-- STATS -->
<div class="stats mb-4">

<div class="stat-box blue">
<h5>Total Patients</h5>
<h2>{{ patients }}</h2>
</div>

<div class="stat-box green">
<h5>Total Appointments</h5>
<h2>{{ appointments }}</h2>
</div>

<div class="stat-box orange">
<h5>Total Doctors</h5>
<h2>{{ doctors }}</h2>
</div>

</div>

<!-- CHART -->
<div class="glass text-center mb-4">
<h5>Disease Analytics</h5>
<img src="/static/chart.png" width="100%">
</div>

<!-- BACK -->
<div class="text-center">
<a href="/dashboard" class="btn btn-back">⬅ Back to Dashboard</a>
</div>

</div>

</body>
</html>
