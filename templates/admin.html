<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

/* GLASS EFFECT */
.glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
}

/* STATS */
.stats {
    display: flex;
    gap: 20px;
}

.stat-box {
    flex: 1;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    transition: 0.3s;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.stat-box:hover {
    transform: translateY(-5px) scale(1.03);
}

/* COLORS */
.blue { background: linear-gradient(135deg, #36d1dc, #5b86e5); }
.green { background: linear-gradient(135deg, #56ab2f, #a8e063); }
.orange { background: linear-gradient(135deg, #f7971e, #ffd200); }

/* BUTTON */
.btn-back {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    border: none;
    padding: 10px 25px;
    border-radius: 10px;
    color: white;
    font-weight: bold;
}

.btn-back:hover {
    transform: scale(1.05);
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-5">👑 Admin Dashboard</h2>

<!-- STATS -->
<div class="stats mb-5">

<div class="stat-box blue">
<h5>Total Patients</h5>
<h2>{{ patients }}</h2>
</div>

<div class="stat-box green">
<h5>Total Appointments</h5>
<h2>{{ appointments }}</h2>
</div>

<div class="stat-box orange">
<h5>Total Doctors</h5>
<h2>{{ doctors }}</h2>
</div>

</div>

<!-- MESSAGE -->
<div class="glass text-center mb-4">
<h5>🚀 System Running Smoothly</h5>
<p>All modules are working fine. You can manage hospital data from dashboard.</p>
</div>

<!-- BACK -->
<div class="text-center">
<a href="/dashboard" class="btn btn-back">⬅ Back to Dashboard</a>
</div>

</div>

</body>
</html>
