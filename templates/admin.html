<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    transition: 0.4s;
}

/* LIGHT MODE */
.light-mode {
    background: linear-gradient(120deg, #84fab0, #8fd3f4);
    color: black;
}

/* DARK MODE */
.dark-mode {
    background: #121212;
    color: white;
}

.dark-mode .card {
    background: #1e1e1e;
    color: white;
}

.card {
    border-radius: 15px;
    padding: 20px;
    animation: fadeIn 0.6s ease-in-out;
    text-align: center;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1;}
}

.card h2 {
    font-size: 40px;
    font-weight: bold;
}

.btn:hover {
    transform: scale(1.05);
}

</style>

</head>

<body class="light-mode" id="body">

<div class="container mt-4">

<!-- NAVBAR -->
<div class="d-flex justify-content-between align-items-center mb-4">

<h2>⚙️ Admin Dashboard</h2>

<div class="d-flex gap-2">
<a href="/dashboard" class="btn btn-primary">Dashboard</a>
<a href="/doctors" class="btn btn-info">Doctors</a>
<a href="/appointments" class="btn btn-success">Appointments</a>
<a href="/admin" class="btn btn-warning">Admin</a>

<button onclick="toggleMode()" class="btn btn-secondary">🌙</button>

<a href="/logout" class="btn btn-danger">Logout</a>
</div>

</div>

<!-- STATS CARDS -->
<div class="row text-center">

<div class="col-md-4 mb-3">
<div class="card bg-primary text-white">
<h5>Total Patients</h5>
<h2>{{ patients }}</h2>
</div>
</div>

<div class="col-md-4 mb-3">
<div class="card bg-warning text-dark">
<h5>Total Doctors</h5>
<h2>{{ doctors }}</h2>
</div>
</div>

<div class="col-md-4 mb-3">
<div class="card bg-success text-white">
<h5>Total Appointments</h5>
<h2>{{ appointments }}</h2>
</div>
</div>

</div>

<!-- EXTRA SECTION -->
<div class="card mt-4">
<h4>System Overview</h4>
<p>This admin panel helps you monitor patients, doctors, and appointments efficiently.</p>
</div>

</div>

<!-- JS -->
<script>
function toggleMode() {
    let body = document.getElementById("body");

    if (body.classList.contains("light-mode")) {
        body.classList.remove("light-mode");
        body.classList.add("dark-mode");
        localStorage.setItem("mode", "dark");
    } else {
        body.classList.remove("dark-mode");
        body.classList.add("light-mode");
        localStorage.setItem("mode", "light");
    }
}

window.onload = function() {
    let mode = localStorage.getItem("mode");
    if (mode === "dark") {
        document.getElementById("body").classList.remove("light-mode");
        document.getElementById("body").classList.add("dark-mode");
    }
}
</script>

</body>
</html>
