<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
<h2>Doctors</h2>

<form method="POST">
<input name="name" placeholder="Doctor Name" class="form-control mb-2">
<input name="spec" placeholder="Specialization" class="form-control mb-2">
<button class="btn btn-primary">Add Doctor</button>
</form>

<hr>

{% for d in doctors %}
<p>{{ d[1] }} - {{ d[2] }}</p>
{% endfor %}

</div>
</body>
</html>
