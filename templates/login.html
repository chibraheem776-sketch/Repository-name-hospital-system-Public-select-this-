<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
    margin:0;
    font-family:'Poppins',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#4e54c8,#8f94fb);
}

/* BACKGROUND IMAGE EFFECT */
body::before {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb');
    background-size:cover;
    opacity:0.25;
}

/* GLASS CARD */
.login-box {
    position:relative;
    width:320px;
    padding:30px;
    border-radius:20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    color:white;
    text-align:center;
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

/* TITLE */
.login-box h2 {
    margin-bottom:20px;
}

/* INPUT */
.input-box {
    text-align:left;
    margin-bottom:15px;
}

.input-box label {
    font-size:14px;
}

.input-box input {
    width:100%;
    padding:10px;
    border:none;
    border-bottom:2px solid white;
    background:transparent;
    color:white;
    outline:none;
}

/* BUTTON */
.btn {
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:white;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
    transition:0.3s;
}

.btn:hover {
    transform:scale(1.05);
}

/* LINKS */
.links {
    margin-top:10px;
    font-size:12px;
}

.links a {
    color:white;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form method="POST">

<div class="input-box">
<label>Username</label>
<input type="text" name="username" required>
</div>

<div class="input-box">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button class="btn">Log in</button>

<div class="links">
<br>
<a href="#">Forget Password</a>
</div>

</form>

</div>

</body>
</html>
