<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    font-family:Segoe UI;
    background: linear-gradient(135deg,#0f2027,#2c5364);
    color:white;
}

/* NAV */
.top-bar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

/* CARDS */
.card-box {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
}

/* STATS */
.stats {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
}

.stat {
    padding:15px;
    border-radius:12px;
    text-align:center;
    font-weight:bold;
}

.blue { background:#2193b0; }
.green { background:#38ef7d; color:black;}
.orange { background:#ff9966; }

/* TABLE */
.table {
    color:white;
}

/* BUTTON */
.btn-custom {
    border-radius:10px;
}

</style>
</head>

<body>

<div class="container mt-3">

<div class="top-bar">
<h4>🏥 Dashboard</h4>

<div>
<a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</div>
</div>

<!-- STATS -->
<div class="stats">

<div class="stat blue">
Patients<br>{{ total }}
</div>

<div class="stat green">
Appointments<br>{{ appointments_count }}
</div>

<div class="stat orange">
Doctors<br>{{ doctors_count }}
</div>

</div>

<!-- QUICK ACTION -->
<div class="card-box">
<h5>Quick Actions</h5>
<a href="/appointments" class="btn btn-success btn-sm">Appointments</a>
<a href="/doctors" class="btn btn-info btn-sm">Doctors</a>
<a href="/admin" class="btn btn-warning btn-sm">Admin</a>
</div>

<!-- ADD PATIENT -->
<div class="card-box">
<h5>Add Patient</h5>

<form action="/add" method="POST">
<input name="name" class="form-control mb-2" placeholder="Name">
<input name="age" class="form-control mb-2" placeholder="Age">
<input name="disease" class="form-control mb-2" placeholder="Disease">

<button class="btn btn-primary w-100">Add</button>
</form>
</div>

<!-- TABLE -->
<div class="card-box">
<h5>Patients</h5>

<table class="table table-striped">
<tr>
<th>Name</th>
<th>Age</th>
<th>Disease</th>
<th>Action</th>
</tr>

{% for p in patients %}
<tr>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
<td>
<a href="/view/{{ p[0] }}" class="btn btn-info btn-sm">View</a>
<a href="/edit/{{ p[0] }}" class="btn btn-warning btn-sm">Edit</a>
<a href="/delete/{{ p[0] }}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}
</table>

</div>

</div>

</body>
</html>
