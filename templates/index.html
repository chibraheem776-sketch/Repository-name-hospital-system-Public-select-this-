<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    font-family: Segoe UI;
    background: linear-gradient(135deg,#0f2027,#2c5364);
    color:white;
    transition:0.4s;
}

/* DARK MODE */
.dark-mode {
    background:#121212;
}

/* NAV */
.top-bar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

/* STATS */
.stats {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
}

.stat {
    padding:15px;
    border-radius:12px;
    text-align:center;
    font-weight:bold;
}

.blue { background:#2193b0; }
.green { background:#38ef7d; color:black;}
.orange { background:#ff9966; }

/* CARD BOX */
.card-box {
    background: rgba(255,255,255,0.1);
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

/* TABLE */
.table {
    color:white;
}

/* BUTTON */
.btn-custom {
    border-radius:10px;
}

</style>
</head>

<body id="body">

<div class="container mt-3">

<!-- HEADER -->
<div class="top-bar">
<h4>🏥 Dashboard</h4>

<div>
<button onclick="toggleMode()" class="btn btn-dark btn-sm">🌙</button>
<a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</div>
</div>

<!-- STATS -->
<div class="stats">

<div class="stat blue">
Patients<br>{{ total }}
</div>

<div class="stat green">
Appointments<br>{{ appointments }}
</div>

<div class="stat orange">
Doctors<br>{{ doctors }}
</div>

</div>

<!-- QUICK ACTION -->
<div class="card-box">
<h5>Quick Actions</h5>
<a href="/appointments" class="btn btn-success btn-sm">Appointments</a>
<a href="/doctors" class="btn btn-info btn-sm">Doctors</a>
<a href="/admin" class="btn btn-warning btn-sm">Admin</a>
</div>

<!-- ADD PATIENT -->
<div class="card-box">
<h5>Add Patient</h5>

<form action="/add" method="POST">
<input name="name" class="form-control mb-2" placeholder="Name" required>
<input name="age" class="form-control mb-2" placeholder="Age" required>
<input name="disease" class="form-control mb-2" placeholder="Disease" required>

<button class="btn btn-primary w-100">Add</button>
</form>
</div>

<!-- TABLE -->
<div class="card-box">
<h5>Patients</h5>

<table class="table table-striped">
<tr>
<th>Name</th>
<th>Age</th>
<th>Disease</th>
<th>Action</th>
</tr>

{% for p in patients %}
<tr>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
<td>
<a href="/view/{{ p[0] }}" class="btn btn-info btn-sm">View</a>
<a href="/edit/{{ p[0] }}" class="btn btn-warning btn-sm">Edit</a>
<a href="/delete/{{ p[0] }}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}

</table>

</div>

</div>

<!-- DARK MODE SCRIPT -->
<script>
function toggleMode() {
    let body = document.getElementById("body");

    if (body.classList.contains("dark-mode")) {
        body.classList.remove("dark-mode");
        localStorage.setItem("mode","light");
    } else {
        body.classList.add("dark-mode");
        localStorage.setItem("mode","dark");
    }
}

window.onload = function() {
    let mode = localStorage.getItem("mode");
    if(mode === "dark"){
        document.getElementById("body").classList.add("dark-mode");
    }
}
</script>

</body>
</html>
