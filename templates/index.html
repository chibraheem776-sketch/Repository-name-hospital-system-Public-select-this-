<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background: linear-gradient(135deg, #141e30, #243b55);
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

/* GLASS */
.glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
}

/* NAVBAR */
.navbar-custom {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* BUTTONS */
.btn-premium {
    border: none;
    border-radius: 10px;
    padding: 8px 15px;
    transition: 0.3s;
}

.btn-premium:hover {
    transform: translateY(-3px);
}

.btn-dashboard { background: #4facfe; }
.btn-doctors { background: #00f2fe; }
.btn-appointments { background: #43e97b; }
.btn-admin { background: #f7971e; }
.btn-logout { background: #ff416c; }

/* CARD */
.card-pro {
    background: white;
    color: black;
    border-radius: 15px;
    padding: 20px;
    transition: 0.3s;
}

.card-pro:hover {
    transform: scale(1.02);
}

/* STATS */
.stats {
    display: flex;
    gap: 15px;
}

.stat-box {
    flex: 1;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    color: white;
}

.blue { background: #2193b0; }
.green { background: #56ab2f; }
.orange { background: #f7971e; }

</style>

</head>

<body>

<div class="container mt-4">

<!-- NAVBAR -->
<div class="navbar-custom mb-4">
<h3>🏥 Hospital System</h3>

<div class="d-flex gap-2">
<a href="/dashboard" class="btn btn-premium btn-dashboard">Dashboard</a>
<a href="/doctors" class="btn btn-premium btn-doctors">Doctors</a>
<a href="/appointments" class="btn btn-premium btn-appointments">Appointments</a>
<a href="/admin" class="btn btn-premium btn-admin">Admin</a>
<a href="/logout" class="btn btn-premium btn-logout">Logout</a>
</div>
</div>

<!-- SEARCH -->
<div class="glass mb-3">
<form method="GET">
<input name="search" class="form-control" placeholder="🔍 Search patient...">
</form>
</div>

<!-- STATS -->
<div class="stats mb-3">
<div class="stat-box blue">
<h5>Total Patients</h5>
<h2>{{ total }}</h2>
</div>

<div class="stat-box green">
<h5>System Status</h5>
<h2>Active</h2>
</div>

<div class="stat-box orange">
<h5>Records</h5>
<h2>{{ total }}</h2>
</div>
</div>

<!-- CHART -->
<div class="glass mb-3 text-center">
<h5>Disease Analytics</h5>
<img src="/static/chart.png" width="100%">
</div>

<!-- ADD -->
<div class="card-pro mb-3">
<h4>Add Patient</h4>

<form action="/add" method="POST">
<input name="name" class="form-control mb-2" placeholder="Name" required>
<input name="age" class="form-control mb-2" placeholder="Age" required>
<input name="disease" class="form-control mb-2" placeholder="Disease" required>

<button class="btn btn-primary w-100">Add Patient</button>
</form>
</div>

<!-- TABLE -->
<div class="card-pro">
<table class="table table-striped">
<tr>
<th>Name</th>
<th>Age</th>
<th>Disease</th>
<th>Action</th>
</tr>

{% for p in patients %}
<tr>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
<td>
<a href="/view/{{ p[0] }}" class="btn btn-info btn-sm">View</a>
<a href="/edit/{{ p[0] }}" class="btn btn-warning btn-sm">Edit</a>
<a href="/delete/{{ p[0] }}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}

</table>
</div>

</div>

</body>
</html>
