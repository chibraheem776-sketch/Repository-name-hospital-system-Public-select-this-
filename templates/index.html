<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* BACKGROUND */
body {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

/* GLASS EFFECT */
.glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 20px;
}

/* NAVBAR */
.navbar-custom {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* BUTTONS */
.btn-premium {
    border: none;
    padding: 8px 16px;
    border-radius: 10px;
    font-weight: 500;
    transition: 0.3s;
}

.btn-premium:hover {
    transform: translateY(-2px);
    opacity: 0.9;
}

.btn-dashboard { background: #3a7bd5; color: white; }
.btn-doctors { background: #00c6ff; color: white; }
.btn-appointments { background: #00d2ff; color: white; }
.btn-admin { background: #f7971e; color: white; }
.btn-logout { background: #ff4b2b; color: white; }

/* CARD */
.card-custom {
    background: white;
    color: black;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
}

/* INPUT */
input {
    border-radius: 10px !important;
}

/* TABLE */
.table {
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

</style>

</head>

<body>

<div class="container mt-4">

<!-- NAVBAR -->
<div class="navbar-custom mb-4">

<h3>🏥 Hospital System</h3>

<div class="d-flex gap-2">
<a href="/dashboard" class="btn btn-premium btn-dashboard">Dashboard</a>
<a href="/doctors" class="btn btn-premium btn-doctors">Doctors</a>
<a href="/appointments" class="btn btn-premium btn-appointments">Appointments</a>
<a href="/admin" class="btn btn-premium btn-admin">Admin</a>
<a href="/logout" class="btn btn-premium btn-logout">Logout</a>
</div>

</div>

<!-- SEARCH -->
<div class="glass mb-3">
<form method="GET">
<input name="search" placeholder="🔍 Search patient..." class="form-control">
</form>
</div>

<!-- STATS -->
<div class="glass mb-3 text-center">
<h5>Total Patients</h5>
<h1>{{ total }}</h1>
</div>

<!-- ADD PATIENT -->
<div class="card-custom">
<h4>Add Patient</h4>

<form action="/add" method="POST">
<input name="name" class="form-control mb-2" placeholder="Name" required>
<input name="age" class="form-control mb-2" placeholder="Age" required>
<input name="disease" class="form-control mb-2" placeholder="Disease" required>

<button class="btn btn-primary w-100">Add Patient</button>
</form>
</div>

<!-- TABLE -->
<div class="card-custom">

<table class="table table-striped">
<tr>
<th>Name</th>
<th>Age</th>
<th>Disease</th>
<th>Action</th>
</tr>

{% for p in patients %}
<tr>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
<td>
<a href="/view/{{ p[0] }}" class="btn btn-info btn-sm">View</a>
<a href="/edit/{{ p[0] }}" class="btn btn-warning btn-sm">Edit</a>
<a href="/delete/{{ p[0] }}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}

</table>

</div>

</div>

</body>
</html>
