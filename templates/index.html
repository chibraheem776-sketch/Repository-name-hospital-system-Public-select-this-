<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#1f4037,#99f2c8);
    color:white;
}

/* NAVBAR */
.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

/* CARDS */
.card-modern {
    border-radius:15px;
    padding:20px;
    color:white;
    transition:0.3s;
}
.card-modern:hover {
    transform:translateY(-5px);
}

.blue { background: linear-gradient(45deg,#36d1dc,#5b86e5); }
.green { background: linear-gradient(45deg,#11998e,#38ef7d); }
.orange { background: linear-gradient(45deg,#ff9966,#ff5e62); }

/* BOX */
.box {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius:15px;
    padding:20px;
    margin-top:15px;
}

/* BUTTON */
.btn-custom {
    border-radius:10px;
}

/* DARK MODE */
.dark-mode {
    background:#121212;
}

</style>
</head>

<body id="body">

<div class="container mt-3">

<!-- TOP BAR -->
<div class="topbar">
<h4>🏥 Dashboard</h4>

<div>
<button onclick="toggleMode()" class="btn btn-dark btn-sm">🌙</button>
<a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</div>
</div>

<!--search bar-->
<div class="mb-3">
<form method="GET">
<input name="search" class="form-control" placeholder="🔍 Search patient...">
</form>
</div>

<!-- STATS CARDS -->
<div class="row">

<div class="col-md-4">
<div class="card-modern blue">
<h6>Patients</h6>
<h2>{{ total }}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card-modern green">
<h6>Appointments</h6>
<h2>{{ appointments_count or 0 }}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card-modern orange">
<h6>Doctors</h6>
<h2>{{ doctors_count or 0 }}</h2>
</div>
</div>

</div>

<!-- QUICK ACTION -->
<div class="box">
<h5>Quick Actions</h5>
<a href="/appointments" class="btn btn-success btn-sm btn-custom">Appointments</a>
<a href="/doctors" class="btn btn-info btn-sm btn-custom">Doctors</a>
<a href="/admin" class="btn btn-warning btn-sm btn-custom">Admin</a>
</div>

<!-- ADD PATIENT -->
<div class="box">
<h5>Add Patient</h5>

<form action="/add" method="POST">
<input name="name" class="form-control mb-2" placeholder="Name" required>
<input name="age" class="form-control mb-2" placeholder="Age" required>
<input name="disease" class="form-control mb-2" placeholder="Disease" required>

<button class="btn btn-primary w-100 btn-custom">Add Patient</button>
</form>
</div>

<!-- TABLE -->
<div class="box">
<h5>Patients</h5>

<table class="table table-dark table-striped">
<tr>
<th>Name</th>
<th>Age</th>
<th>Disease</th>
<th>Action</th>
</tr>

{% for p in patients %}
<tr>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
<td>
<a href="/view/{{ p[0] }}" class="btn btn-info btn-sm">View</a>
<a href="/edit/{{ p[0] }}" class="btn btn-warning btn-sm">Edit</a>
<a href="/delete/{{ p[0] }}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}

</table>
</div>

</div>

<!-- DARK MODE SCRIPT -->
<script>
function toggleMode(){
    let body=document.getElementById("body");
    body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
