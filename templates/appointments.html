<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
<h2>Appointments</h2>

<form method="POST">
<input name="patient" placeholder="Patient Name" class="form-control mb-2">
<input name="doctor" placeholder="Doctor Name" class="form-control mb-2">
<input name="date" type="date" class="form-control mb-2">
<button class="btn btn-success">Book</button>
</form>

<hr>

{% for a in data %}
<p>{{ a[1] }} → {{ a[2] }} on {{ a[3] }}</p>
{% endfor %}

</div>
</body>
</html>
