<!DOCTYPE html>
<html>
<head>
<title>Welcome</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
}

.slide {
    height: 100vh;
    width: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    flex-direction: column;
}

.active {
    display: flex;
}

/* COLORS */
.s1 { background: linear-gradient(135deg, #667eea, #764ba2); }
.s2 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
.s3 { background: linear-gradient(135deg, #ff6a00, #ee0979); }

button {
    margin-top: 20px;
    padding: 10px 25px;
    border: none;
    border-radius: 10px;
    background: white;
    color: black;
    font-weight: bold;
}

</style>

</head>

<body>

<div class="slide s1 active">
    <h1>🏥 Welcome</h1>
    <h3>Hospital Management System</h3>
    <button onclick="nextSlide()">Next</button>
</div>

<div class="slide s2">
    <h1>📋 Our Services</h1>
    <p>Patient Management</p>
    <p>Doctor Management</p>
    <p>Appointments Booking</p>
    <button onclick="nextSlide()">Next</button>
</div>

<div class="slide s3">
    <h1>🚀 Get Started</h1>
    <p>Manage everything in one place</p>
    <a href="/login"><button>Login</button></a>
</div>

<script>
let current = 0;
let slides = document.querySelectorAll(".slide");

function nextSlide() {
    slides[current].classList.remove("active");
    current++;
    slides[current].classList.add("active");
}
</script>

</body>
</html>
