<!DOCTYPE html>
<html>
<head>
<title>Welcome</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css"/>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7fa;
}

/* SLIDER FULL SCREEN */
.swiper {
    width: 100%;
    height: 100vh;
}

/* CARD STYLE */
.slide-card {
    width: 90%;
    max-width: 350px;
    background: white;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* IMAGE */
.slide-card img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 15px;
}

/* TITLE */
.slide-card h4 {
    font-weight: bold;
}

/* TEXT */
.slide-card p {
    font-size: 14px;
    color: #666;
}

/* BUTTON */
.btn-next {
    background: #4facfe;
    border: none;
    color: white;
    border-radius: 20px;
    padding: 8px 20px;
    margin-top: 10px;
}

/* CENTER */
.swiper-slide {
    display: flex;
    justify-content: center;
    align-items: center;
}

</style>
</head>

<body>

<div class="swiper">
    <div class="swiper-wrapper">

        <!-- SLIDE 1 -->
        <div class="swiper-slide">
            <div class="slide-card">
                <img src="https://cdn-icons-png.flaticon.com/512/2785/2785819.png">
                <h4>Welcome</h4>
                <p>Hospital Management System</p>
            </div>
        </div>

        <!-- SLIDE 2 -->
        <div class="swiper-slide">
            <div class="slide-card">
                <img src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png">
                <h4>Appointments</h4>
                <p>Book & manage appointments easily</p>
            </div>
        </div>

        <!-- SLIDE 3 -->
        <div class="swiper-slide">
            <div class="slide-card">
                <img src="https://cdn-icons-png.flaticon.com/512/3774/3774341.png">
                <h4>Doctors</h4>
                <p>View doctors & manage records</p>

                <a href="/login" class="btn btn-next">Start</a>
            </div>
        </div>

    </div>

    <!-- DOTS -->
    <div class="swiper-pagination"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>

<script>
new Swiper('.swiper', {
    pagination: {
        el: '.swiper-pagination',
    },
});
</script>

</body>
</html>
