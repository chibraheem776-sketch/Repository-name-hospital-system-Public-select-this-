<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css"/>

<style>
body { margin:0; font-family:Segoe UI; background:#0f172a; }
.swiper { height:100vh; }

.slide {
    display:flex; justify-content:center; align-items:center;
    flex-direction:column; color:white; text-align:center;
}

.card-ui {
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:30px;
    width:85%;
    max-width:350px;
}

.card-ui img { width:80px; margin-bottom:15px; }

.btn-start {
    background:#4facfe;
    border:none;
    padding:10px 20px;
    border-radius:20px;
    color:white;
}
</style>
</head>

<body>

<div class="swiper">
<div class="swiper-wrapper">

<div class="swiper-slide slide">
<div class="card-ui">
<img src="https://cdn-icons-png.flaticon.com/512/2966/2966486.png">
<h4>Welcome</h4>
<p>Hospital Management System</p>
</div>
</div>

<div class="swiper-slide slide">
<div class="card-ui">
<img src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png">
<h4>Appointments</h4>
<p>Manage bookings easily</p>
</div>
</div>

<div class="swiper-slide slide">
<div class="card-ui">
<img src="https://cdn-icons-png.flaticon.com/512/3774/3774341.png">
<h4>Doctors</h4>
<p>Track all doctors & patients</p>
<a href="/login" class="btn-start mt-2">Start</a>
</div>
</div>

</div>
<div class="swiper-pagination"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
<script>
new Swiper('.swiper',{pagination:{el:'.swiper-pagination'}});
</script>

</body>
</html>
